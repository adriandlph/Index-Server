spring.application.name=Index-Server
server.port=9000

server.ssl.key-store=secrets/ssl-key.p12
server.ssl.key-store-password=changeit
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=ssl-key

spring.datasource.url=jdbc:sqlite:IndexServer.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

logging.file.name=logs/index-server.log
logging.logback.rollingpolicy.file-name-pattern=logs/index-server-%d{yyyy-MM-dd}.%i.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30
